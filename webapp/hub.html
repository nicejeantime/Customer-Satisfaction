<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디케이테크인 고객 만족도 조사 — 허브</title>
<style>
  :root{
    --accent:#3366FF; --accent-light:#F4F9FF; --accent-hover:#ABC1D1;
    --bg:#F7F7F7; --card:#FFFFFF; --border:#DDDDDD;
    --text:#191919; --muted:#595959; --placeholder:#949494;
    --font-family:system-ui,-apple-system,'Helvetica Neue','Apple SD Gothic Neo','Segoe UI',Roboto,Arial,'NotoSans','Open Sans','Malgun Gothic','맑은 고딕',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-family);background:var(--bg);color:var(--text);}
  .wrap{max-width:720px;margin:0 auto;padding:48px 20px 80px;}
  h1{font-size:20px;line-height:29px;font-weight:700;margin:0 0 4px;}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:32px;}
  .cards{display:flex;flex-direction:column;gap:14px;}
  a.card{
    display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:20px;text-decoration:none;color:inherit;transition:.12s;
  }
  a.card:hover{border-color:var(--accent);background:var(--accent-light);}
  .card .icon{
    width:44px;height:44px;border-radius:10px;background:var(--accent-light);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  }
  .card .body{flex:1;}
  .card .title{font-weight:700;font-size:15px;margin-bottom:2px;}
  .card .desc{color:var(--muted);font-size:12.5px;}
  .card .arrow{color:var(--placeholder);font-size:18px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>디케이테크인 고객 만족도 조사</h1>
  <div class="subtitle">아래에서 바로 이동하세요.</div>
  <div class="cards">
    <a class="card" href="./index.html">
      <div class="icon">🧭</div>
      <div class="body">
        <div class="title">마법사 (조사 설계)</div>
        <div class="desc">고객사 정보·서비스 형태·항목·배점을 정하고 응답 URL을 생성합니다.</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="card" href="https://script.google.com/macros/s/AKfycbwZlHvLddx6pfIoD91b-Z6Q6kvHXvYJ3b_MvSuzIU_3l6Goqm2TwoLCBTem8IhhWRp0/exec" target="_blank" rel="noopener">
      <div class="icon">📝</div>
      <div class="body">
        <div class="title">설문 응답 페이지 (미리보기)</div>
        <div class="desc">고객사가 실제로 보는 화면입니다. 여기서는 서비스 형태를 직접 선택해서 미리 볼 수 있어요.</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="card" href="https://script.google.com/macros/s/AKfycby2HknyqU_FX9k7vBmhHuagmq69ddIL6f9avdNuRk6kNMJUeRJr7s0YNZvrCQirUQHt/exec?view=dashboard" target="_blank" rel="noopener">
      <div class="icon">📊</div>
      <div class="body">
        <div class="title">대시보드</div>
        <div class="desc">고객사별 응답 종합 현황을 봅니다. dktechin.com 계정 로그인이 필요합니다.</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
</div>
</body>
</html>
