<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디케이테크인 고객 만족도 조사</title>
<style>
  :root{
    /* BIZ PC Platform Design System */
    --accent:#3366FF; --accent-light:#F4F9FF; --accent-hover:#ABC1D1;
    --bg:#F7F7F7; --card:#FFFFFF; --border:#DDDDDD;
    --text:#191919; --muted:#595959; --placeholder:#949494;
    --error:#F4651E;
    --font-family:system-ui,-apple-system,'Helvetica Neue','Apple SD Gothic Neo','Segoe UI',Roboto,Arial,'NotoSans','Open Sans','Malgun Gothic','맑은 고딕',sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:var(--font-family);
    background:var(--bg); color:var(--text);
  }
  .wrap{max-width:840px;margin:0 auto;padding:32px 20px 110px;}
  h1{font-size:20px;line-height:29px;font-weight:700;margin:0 0 4px;}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:24px;}
  .steps{margin-bottom:20px;}
  .step-counter{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.02em;margin-bottom:8px;}
  .step-dots{display:flex;gap:6px;}
  .step-dot{flex:1;height:6px;border-radius:4px;background:var(--border);}
  .step-dot.active{background:var(--accent);}
  .step-dot.done{background:var(--accent-hover);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;}
  .card h2{font-size:18px;line-height:26px;font-weight:700;margin:0 0 4px;}
  .card h3{font-size:13px;line-height:18px;font-weight:700;margin:20px 0 10px;}
  .card h3:first-of-type{margin-top:0;}
  .card .hint{color:var(--muted);font-size:12.5px;margin-bottom:20px;}
  .wizard-footer{
    position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--border);
    padding:14px 20px;box-shadow:0 -2px 10px rgba(0,0,0,.05);z-index:10;
  }
  .wizard-footer-inner{max-width:840px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px;}
  input[type=text],input[type=date],input[type=number],select,textarea{
    width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;
    font-family:inherit;background:#fff;
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
  .check-row{display:flex;align-items:center;gap:8px;margin-top:16px;}
  .check-row.tight{margin-top:6px;}
  .check-row input{width:auto;}
  .check-row label{margin:0;font-weight:500;}
  .label-hint{font-weight:400;color:var(--muted);}
  .inline-row{display:flex;gap:8px;}
  .inline-row input{flex:1;}
  .inline-row button{white-space:nowrap;}
  .url-hint{margin-top:6px;margin-bottom:0;}
  .signature{margin-top:24px;}
  .service-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
  .service-card{
    border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.12s;
  }
  .service-card:hover{border-color:var(--accent-hover);}
  .service-card.selected{border-color:var(--accent);background:var(--accent-light);}
  .service-card .name{font-weight:700;font-size:14px;}
  .service-card .desc{color:var(--muted);font-size:12px;margin-top:4px;}
  .option-item{
    display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border);
    border-radius:8px;padding:12px;margin-bottom:10px;background:var(--bg);
  }
  .option-item input{width:auto;margin-top:2px;}
  .option-item .oname{font-weight:600;font-size:13.5px;}
  .option-item .odesc{color:var(--placeholder);font-size:12px;margin-top:2px;}
  .badge{display:inline-block;font-size:10.5px;background:var(--accent-light);color:var(--accent);border-radius:5px;padding:1px 6px;margin-left:6px;font-weight:600;}
  .weight-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .weight-row .wlabel{width:110px;font-size:13px;font-weight:600;}
  .weight-row input{width:90px;}
  .sum-indicator{font-size:13px;margin-top:6px;font-weight:600;}
  .sum-ok{color:#1a8f45;}
  .sum-bad{color:var(--error);}
  .preset-btn{
    background:#fff;border:1px solid var(--accent);color:var(--accent);border-radius:7px;
    padding:6px 12px;font-size:12.5px;cursor:pointer;margin-top:8px;
  }
  button.nav{
    border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;
  }
  button.primary{background:var(--accent);color:#fff;}
  button.primary:disabled{background:#F5F5F5;color:var(--placeholder);cursor:not-allowed;}
  button.secondary{background:#EEEEEE;color:var(--text);}
  .error{color:var(--error);font-size:12.5px;margin-top:10px;}
  table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px;}
  th,td{border:1px solid var(--border);padding:7px 9px;text-align:left;}
  th{background:var(--bg);}
  .result-actions{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .result-actions button{
    background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 14px;
    font-size:13px;cursor:pointer;font-weight:600;
  }
  .result-actions button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .preview{border:1px solid var(--border);border-radius:10px;padding:20px;background:#fff;}
  .preview h2{font-size:18px;line-height:26px;font-weight:700;margin:0 0 4px;}
  .preview h3{font-size:14px;line-height:20px;font-weight:700;margin:20px 0 4px;}
  .preview h3:first-child{margin-top:0;}
  .grade-list{font-size:13px;line-height:1.9;}
  @media print{
    .no-print{display:none !important;}
    body{background:#fff;}
    .card,.preview{border:none;padding:0;}
  }
</style>
</head>

  clientOrg:'', serviceName:'',
  periodStart:'', periodEnd:'',
  evaluator:'',
  contractTypes:[],
  serviceType:null,
  enabledOptions:{},
  includeRelationship:true,

  weightsTouched:false,

function primaryContractType(){
  if(state.contractTypes.includes('outcome')) return 'outcome';
  if(state.contractTypes.includes('sla')) return 'sla';
  return 'fixed';
}

function contractLabel(){
  if(!state.contractTypes.length) return '-';
  return state.contractTypes.map(k=>CONTRACT_PRESETS[k].name).join(' + ');
}

let step = 0;
const TOTAL_STEPS = 5;

function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }

function renderStepsBar(){
  const bar = document.getElementById('stepsBar');
  const current = Math.min(step+1, TOTAL_STEPS);
  let dots = '';
  for(let i=0;i<TOTAL_STEPS;i++){
    let cls = 'step-dot';
    if(i<step) cls += ' done';
    if(i===step) cls += ' active';
    dots += `<div class="${cls}"></div>`;
  }
  bar.innerHTML = `<div class="step-counter">STEP ${current} / ${TOTAL_STEPS}</div><div class="step-dots">${dots}</div>`;
}

const STEP_NEXT_HANDLERS = ['step1Next()','step2Next()','step3Next()','step4Next()'];
const STEP_NEXT_LABELS = ['다음','다음','다음','조사지 생성'];

function renderFooter(){
  const footer = document.getElementById('footerArea');
  if(step>=4){ footer.style.display='none'; footer.innerHTML=''; return; }
  footer.style.display='block';
  const prevBtn = step>0 ? `<button class="nav secondary" onclick="goStep(${step-1})">이전</button>` : `<span></span>`;
  footer.innerHTML = `<div class="wizard-footer-inner">${prevBtn}<button class="nav primary" id="footerNextBtn" onclick="${STEP_NEXT_HANDLERS[step]}">${STEP_NEXT_LABELS[step]}</button></div>`;
}

function goStep(n){
  step = Math.max(0, Math.min(TOTAL_STEPS-1, n));
  render();
}

function render(){
  renderStepsBar();
  renderFooter();
  const area = document.getElementById('stepArea');
  const result = document.getElementById('resultArea');
  result.innerHTML = '';
  if(step===0){ area.style.display='block'; area.innerHTML=''; area.appendChild(renderStep1()); }
  else if(step===1){ area.style.display='block'; area.innerHTML=''; area.appendChild(renderStep2()); }
  else if(step===2){ area.style.display='block'; area.innerHTML=''; area.appendChild(renderStep3()); }
  else if(step===3){ area.style.display='block'; area.innerHTML=''; area.appendChild(renderStep4()); }
  else { area.style.display='none'; renderResult(result); }
}

  const c = el('<div></div>');
  c.innerHTML = `
    <h2>1. 고객사 정보</h2>
    <div class="hint">평가표 상단에 들어갈 기본 정보를 입력합니다. 운영은 24시간 365일 기준입니다. (* 필수)</div>
    <div class="row2">
      <div><label>고객사명 *</label><input type="text" id="in_clientOrg" placeholder="예: 디케이테크인" value="${state.clientOrg}"></div>
      <div><label>서비스명 *</label><input type="text" id="in_serviceName" placeholder="예: 커넥트톡" value="${state.serviceName}"></div>
    </div>
    <div class="row2">
      <div><label>평가 기간 시작 *</label><input type="date" id="in_periodStart" value="${state.periodStart}"></div>
      <div><label>평가 기간 종료 *</label><input type="date" id="in_periodEnd" value="${state.periodEnd}"></div>
    </div>
    <label>평가자명 * <span class="label-hint">(고객사에서 입력)</span></label>
    <input type="text" id="in_evaluator" placeholder="고객사 담당자명을 입력하세요" value="${state.evaluator}">
    <label>계약 * <span class="label-hint">(복수 선택 가능)</span></label>
    <div class="check-row tight">
      <input type="checkbox" id="ct_fixed" ${state.contractTypes.includes('fixed')?'checked':''}>
      <label for="ct_fixed">정액 운영 계약</label>
    </div>
    <div class="check-row">
      <input type="checkbox" id="ct_outcome" ${state.contractTypes.includes('outcome')?'checked':''}>
      <label for="ct_outcome">성과 기반(Outcome-based) 계약</label>
    </div>
    <div class="check-row">
      <input type="checkbox" id="ct_sla" ${state.contractTypes.includes('sla')?'checked':''}>
      <label for="ct_sla">SLA 계약</label>
    </div>
    <div class="error" id="err1"></div>
  `;
  return c;
}

function step1Next(){
  state.clientOrg = document.getElementById('in_clientOrg').value.trim();
  state.serviceName = document.getElementById('in_serviceName').value.trim();
  state.periodStart = document.getElementById('in_periodStart').value;
  state.periodEnd = document.getElementById('in_periodEnd').value;
  state.evaluator = document.getElementById('in_evaluator').value.trim();
  state.contractTypes = ['fixed','outcome','sla'].filter(k => document.getElementById('ct_'+k).checked);

  if(!state.clientOrg || !state.serviceName){
    document.getElementById('err1').textContent = '고객사명과 서비스명은 필수입니다.';
    return;
  }
  if(!state.periodStart || !state.periodEnd){
    document.getElementById('err1').textContent = '평가 기간(시작/종료)을 입력해주세요.';
    return;
  }
  if(!state.evaluator){
    document.getElementById('err1').textContent = '평가자명을 입력해주세요.';
    return;
  }
  if(state.contractTypes.length===0){
    document.getElementById('err1').textContent = '계약을 최소 1개 이상 선택해주세요.';
    return;
  }
  document.getElementById('err1').textContent = '';
  if(!state.weightsTouched){
    const preset = CONTRACT_PRESETS[primaryContractType()];
    state.weights = {productivity:preset.productivity, quality:preset.quality, performance:preset.performance};
  }
  goStep(1);
}

function renderStep2(){
  const c = el('<div></div>');
  let cards = Object.keys(MODULES).map(key=>{
    const m = MODULES[key];
    const sel = state.serviceType===key ? 'selected' : '';
    return `<div class="service-card ${sel}" onclick="selectService('${key}')">
      <div class="name">${m.label}</div>
      <div class="desc">${m.desc}</div>
    </div>`;
  }).join('');
  c.innerHTML = `
    <h2>2. 서비스 형태 선택</h2>
    <div class="hint">평가 대상 서비스에 가장 가까운 형태를 선택하세요.</div>
    <div class="service-grid">${cards}</div>
    <div class="error" id="err2"></div>
  `;
  return c;
}

function selectService(key){
  state.serviceType = key;
  state.enabledOptions = {};
  const m = MODULES[key];
  [...m.productivity, ...m.quality, ...m.performance].forEach(it=>{
    state.enabledOptions[it.key] = true;
  });
  [...m.productivityOptions, ...m.performanceOptions].forEach(opt=>{
    state.enabledOptions[opt.key] = opt.suggest==='always';
  });
  render();
}

function step2Next(){
  if(!state.serviceType){
    document.getElementById('err2').textContent='서비스 형태를 선택해주세요.';
    return;
  }
  goStep(2);
}

function renderStep3(){
  const c = el('<div></div>');
  const m = MODULES[state.serviceType];

  function itemRow(o){
    return `<div class="option-item">
      <input type="checkbox" id="opt_${o.key}" ${state.enabledOptions[o.key]?'checked':''} onchange="toggleOption('${o.key}', this.checked)">
      <div>
        <div class="oname">${o.name} ${o.tag?`<span class="badge">${o.tag}</span>`:''}</div>
        <div class="odesc">${o.def || o.detail} ${o.sla?`— 목표: ${o.sla}`:''}</div>
      </div>
    </div>`;
  }

  function sectionHtml(title, baseItems, optionItems){
    const rows = [...baseItems, ...optionItems].map(itemRow).join('');
    return `<h3>${title}</h3>${rows}`;
  }

  c.innerHTML = `
    <h2>3. 평가 항목 선택</h2>
    <div class="hint">이번 조사에 포함할 항목을 선택하세요. 기본적으로 모든 항목이 포함되어 있습니다.</div>
    ${sectionHtml('생산성', m.productivity, m.productivityOptions)}
    ${sectionHtml('품질', m.quality, [])}
    ${sectionHtml('성과', m.performance, m.performanceOptions)}
    <div class="check-row">
      <input type="checkbox" id="in_relationship" ${state.includeRelationship?'checked':''}>
      <label for="in_relationship">종합의견에 "재계약/추천 의향" 관계형 문항 추가 (권장)</label>
    </div>
    <div class="error" id="err3"></div>
  `;
  return c;
}

function toggleOption(key, checked){
  state.enabledOptions[key] = checked;
}

function step3Next(){
  state.includeRelationship = document.getElementById('in_relationship').checked;
  const m = MODULES[state.serviceType];
  const prodCount = [...m.productivity, ...m.productivityOptions].filter(o=>state.enabledOptions[o.key]).length;
  const qualCount = m.quality.filter(o=>state.enabledOptions[o.key]).length;
  const perfCount = [...m.performance, ...m.performanceOptions].filter(o=>state.enabledOptions[o.key]).length;
  if(prodCount===0 || qualCount===0 || perfCount===0){
    document.getElementById('err3').textContent = '각 영역(생산성/품질/성과)에 최소 1개 항목은 선택되어야 합니다.';
    return;
  }
  goStep(3);
}

function renderStep4(){
  const c = el('<div></div>');
  const w = state.weights;
  c.innerHTML = `
    <h2>4. 배점 비중 조정</h2>
    <div class="hint">기본값은 계약에 따라 자동 제안됩니다. 합계는 100이어야 합니다.</div>
    <div class="weight-row"><span class="wlabel">생산성 (정량)</span><input type="number" id="w_productivity" value="${w.productivity}"></div>
    <div class="weight-row"><span class="wlabel">품질 (정성)</span><input type="number" id="w_quality" value="${w.quality}"></div>
    <div class="weight-row"><span class="wlabel">성과</span><input type="number" id="w_performance" value="${w.performance}"></div>
    <div class="sum-indicator" id="sumIndicator"></div>
    <button class="preset-btn" onclick="applyPreset()">${CONTRACT_PRESETS[primaryContractType()].label} 적용 (${CONTRACT_PRESETS[primaryContractType()].productivity}/${CONTRACT_PRESETS[primaryContractType()].quality}/${CONTRACT_PRESETS[primaryContractType()].performance})</button>
  `;
  setTimeout(()=>{
    updateSumIndicator();
    ['w_productivity','w_quality','w_performance'].forEach(id=>{
      document.getElementById(id).addEventListener('input', updateSumIndicator);
    });
  }, 0);
  return c;
}

function updateSumIndicator(){
  const p = parseInt(document.getElementById('w_productivity').value)||0;
  const q = parseInt(document.getElementById('w_quality').value)||0;
  const f = parseInt(document.getElementById('w_performance').value)||0;
  const sum = p+q+f;
  const ind = document.getElementById('sumIndicator');
  ind.textContent = `합계: ${sum} / 100`;
  ind.className = 'sum-indicator ' + (sum===100 ? 'sum-ok' : 'sum-bad');
  const btn = document.getElementById('footerNextBtn');
  if(btn) btn.disabled = sum!==100;
}

function applyPreset(){
  const preset = CONTRACT_PRESETS[primaryContractType()];
  document.getElementById('w_productivity').value = preset.productivity;
  document.getElementById('w_quality').value = preset.quality;
  document.getElementById('w_performance').value = preset.performance;
  updateSumIndicator();
}

function step4Next(){
  state.weights = {
    productivity: parseInt(document.getElementById('w_productivity').value)||0,
    quality: parseInt(document.getElementById('w_quality').value)||0,
    performance: parseInt(document.getElementById('w_performance').value)||0,
  };
  state.weightsTouched = true;
  goStep(4);
}

function distribute(items, target){
  const raw = items.reduce((s,i)=>s+i.weight,0);
  if(raw===0 || items.length===0) return items.map(i=>({...i, points:0}));
  let running=0;
  return items.map((i,idx)=>{
    let p;
    if(idx===items.length-1){ p = target - running; }
    else { p = Math.round(i.weight/raw*target); running+=p; }
    return {...i, points:p};
  });
}

function buildData(){
  const m = MODULES[state.serviceType];
  const prodItems = [...m.productivity, ...m.productivityOptions].filter(o=>state.enabledOptions[o.key]);
  const perfItems = [...m.performance, ...m.performanceOptions].filter(o=>state.enabledOptions[o.key]);
  const qualItems = m.quality.filter(o=>state.enabledOptions[o.key]);
  return {
    productivity: distribute(prodItems, state.weights.productivity),
    quality: distribute(qualItems, state.weights.quality),
    performance: distribute(perfItems, state.weights.performance),
    penalty: m.penalty,
    module: m,
  };
}

function fmtDate(d){ return d || '____-__-__'; }

function renderResult(container){
  const data = buildData();
  const total = state.weights.productivity + state.weights.quality + state.weights.performance;

  let html = `<div class="result-actions no-print">
    <button onclick="restart()">처음부터 다시</button>
    <button onclick="goStep(3)">이전으로</button>
    <button class="primary" onclick="generateUrl()">URL 생성</button>
  </div>
  <div id="urlResultBox" class="no-print"></div>`;

  html += `<div class="preview">`;
  html += `<h2>${state.clientOrg} ${state.serviceName} 운영 평가</h2>`;
  html += `<table>
    <tr><th>프로젝트명</th><td>${state.clientOrg} 운영 평가</td></tr>
    <tr><th>평가 대상</th><td>${state.serviceName} (${data.module.label})</td></tr>
    <tr><th>평가 기간</th><td>${fmtDate(state.periodStart)} ~ ${fmtDate(state.periodEnd)}</td></tr>
    <tr><th>계약</th><td>${contractLabel()}</td></tr>
    <tr><th>평가자</th><td>${state.evaluator}</td></tr>
  </table>`;

  html += `<h3>총점 배점 구조</h3><table>
    <tr><th>구분</th><th>배점</th><th>획득 점수</th></tr>
    <tr><td>생산성(정량)</td><td>${state.weights.productivity}</td><td></td></tr>
    <tr><td>품질(정성)</td><td>${state.weights.quality}</td><td></td></tr>
    <tr><td>성과</td><td>${state.weights.performance}</td><td></td></tr>
    <tr><td><b>총점</b></td><td><b>${total}</b></td><td></td></tr>
  </table>`;

  html += `<h3>[생산성]</h3><table><tr><th>평가 항목</th><th>산정 방식</th><th>목표 수준(SLA)</th><th>배점</th><th>평가 결과</th></tr>`;
  data.productivity.forEach(i=>{ html += `<tr><td>${i.name}</td><td>${i.def}</td><td>${i.sla}</td><td>${i.points}</td><td></td></tr>`; });
  html += `<tr><td colspan="3"><b>합계</b></td><td><b>${state.weights.productivity}</b></td><td></td></tr></table>`;

  html += `<h3>[품질]</h3><table><tr><th>평가 항목</th><th>상세 내용</th><th>배점</th><th>평가 결과</th></tr>`;
  data.quality.forEach(i=>{ html += `<tr><td>${i.name}</td><td>${i.detail}</td><td>${i.points}</td><td></td></tr>`; });
  html += `<tr><td>감점(Penalty)</td><td>${data.penalty}</td><td>-</td><td></td></tr>`;
  html += `<tr><td colspan="2"><b>합계</b></td><td><b>${state.weights.quality}</b></td><td></td></tr></table>`;

  html += `<h3>[성과]</h3><table><tr><th>평가 항목</th><th>상세 내용</th><th>배점</th><th>평가 결과</th></tr>`;
  data.performance.forEach(i=>{ html += `<tr><td>${i.name}</td><td>${i.detail}</td><td>${i.points}</td><td></td></tr>`; });
  html += `<tr><td colspan="2"><b>합계</b></td><td><b>${state.weights.performance}</b></td><td></td></tr></table>`;

  html += `<h3>종합의견</h3><table>
    <tr><th>강점(Keep)</th><td></td></tr>
    <tr><th>개선점(Improve)</th><td></td></tr>`;
  if(state.includeRelationship) html += `<tr><th>재계약/추천 의향</th><td></td></tr>`;
  html += `</table>`;

  html += `<h3>평가 등급</h3><div class="grade-list">
    ☐ S (95점 이상): 최우수<br>☐ A (90점 이상): 우수<br>☐ B (80점 이상): 보통<br>☐ C (70점 이상): 미흡<br>☐ D (70점 미만): 저조
  </div>`;

  html += `<p class="signature">담당자 ${state.evaluator} (인)</p>`;
  html += `</div>`;

  container.innerHTML = html;
}

function getGsurveyBaseUrl(promptIfMissing){
  let base = localStorage.getItem('gsurveyBaseUrl') || '';
  if(!base && promptIfMissing){
    base = prompt('배포된 응답 수집 웹앱 URL을 입력하세요\n(예: https://script.google.com/macros/s/xxxx/exec)\n최초 1회만 입력하면 저장됩니다.') || '';
    if(base.trim()) localStorage.setItem('gsurveyBaseUrl', base.trim());
  }
  return (base||'').trim();
}

function changeGsurveyBaseUrl(){
  localStorage.removeItem('gsurveyBaseUrl');
  generateUrl();
}

function generateUrl(){
  const base = getGsurveyBaseUrl(true);
  if(!base) return;
  const url = base.replace(/\/$/,'') + '?client=' + encodeURIComponent(state.clientOrg) + '&type=' + encodeURIComponent(state.serviceType);
  const box = document.getElementById('urlResultBox');
  box.innerHTML = `
    <label>고객사 전달용 URL</label>
    <div class="inline-row">
      <input type="text" id="generatedUrl" value="${url}" readonly>
      <button class="nav secondary" onclick="copyGeneratedUrl()">복사</button>
    </div>
    <div class="hint url-hint">웹앱 URL을 바꾸려면 <a href="#" onclick="changeGsurveyBaseUrl();return false;">여기</a>를 클릭하세요.</div>
  `;
}

function copyGeneratedUrl(){
  const input = document.getElementById('generatedUrl');
  navigator.clipboard.writeText(input.value).then(()=>alert('URL이 복사되었습니다.'));
}

function restart(){
  state = {
    clientOrg:'', serviceName:'',
    periodStart:'', periodEnd:'',
    evaluator:'',
    contractTypes:[],
    serviceType:null, enabledOptions:{}, includeRelationship:true,
    weights:{productivity:40, quality:30, performance:30}, weightsTouched:false,
  };
  goStep(0);
}

render();
</script>
</body>
</html>
